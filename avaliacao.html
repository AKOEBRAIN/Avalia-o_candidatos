// Variáveis de controle
let perguntasAtuais = [];
let perguntaAtualIndex = 0;
let acertos = 0;

// Configuração do Tempo (Você pode alterar aqui: ex: 45 ou 60 segundos)
const TEMPO_POR_PERGUNTA = 60; 
let tempoRestante = TEMPO_POR_PERGUNTA;
let timerInterval;

// 🚨 SISTEMA ANTI-COLA (Verifica se o candidato mudou de aba/janela) 🚨
document.addEventListener("visibilitychange", () => {
    // Se a página ficar oculta e o teste ainda estiver rodando na tela
    if (document.visibilityState === 'hidden' && document.getElementById('area-avaliacao').style.display !== 'none') {
        alert("⚠️ ATENÇÃO: Você saiu da aba da avaliação.\n\nPor medidas de segurança e para evitar consultas externas (cola), o seu teste foi CANCELADO.");
        window.location.href = "index.html"; // Manda de volta para o início
    }
});

// Inicialização
window.onload = function() {
    if (idVaga && bancoDePerguntas[idVaga]) {
        document.getElementById('titulo-vaga').innerText = "Avaliação - " + nomesVagas[idVaga];
        perguntasAtuais = bancoDePerguntas[idVaga];
        renderizarPergunta();
    } else {
        document.getElementById('area-avaliacao').innerHTML = "<p style='text-align:center; color:red;'>Erro: Vaga não identificada. Volte à tela inicial.</p>";
    }
};

function iniciarCronometro() {
    clearInterval(timerInterval);
    tempoRestante = TEMPO_POR_PERGUNTA;
    document.getElementById('cronometro').innerText = tempoRestante;
    
    timerInterval = setInterval(() => {
        tempoRestante--;
        document.getElementById('cronometro').innerText = tempoRestante;
        
        // Se o tempo acabar
        if (tempoRestante <= 0) {
            clearInterval(timerInterval);
            alert("⏰ O tempo esgotou para esta pergunta! Avançando para a próxima...");
            proximoPasso(true); // O 'true' avisa o sistema que o tempo acabou
        }
    }, 1000); // 1000 milissegundos = 1 segundo
}

function renderizarPergunta() {
    const box = document.getElementById('box-pergunta');
    const progresso = document.getElementById('progresso');
    const btnAcao = document.getElementById('btn-acao');
    
    progresso.innerText = `Pergunta ${perguntaAtualIndex + 1} de ${perguntasAtuais.length}`;
    
    const p = perguntasAtuais[perguntaAtualIndex];
    let html = `<div class="question-text">${perguntaAtualIndex + 1}. ${p[0]}</div>`;
    
    // Embaralhador das alternativas
    let opcoes = p[1].map((texto, indiceOriginal) => {
        return { texto: texto, valorCorreto: indiceOriginal };
    });
    opcoes.sort(() => Math.random() - 0.5);

    opcoes.forEach((opcao) => {
        html += `<label class="option-label"><input type="radio" name="alternativa" value="${opcao.valorCorreto}"> ${opcao.texto}</label>`;
    });
    
    box.innerHTML = html;

    if (perguntaAtualIndex === perguntasAtuais.length - 1) {
        btnAcao.innerText = "Finalizar Avaliação";
        btnAcao.style.background = "#25D366"; 
        btnAcao.style.color = "#fff";
    }

    // Dispara o relógio assim que a pergunta aparece
    iniciarCronometro();
}

// O (tempoEsgotado = false) indica que, por padrão, ele clicou no botão. 
// Se vier true, é porque a função do relógio estourou.
function proximoPasso(tempoEsgotado = false) {
    const respostaSelecionada = document.querySelector('input[name="alternativa"]:checked');
    
    // Se ele clicou no botão sem escolher nada e o tempo AINDA NÃO acabou
    if (!tempoEsgotado && !respostaSelecionada) {
        alert("Por favor, selecione uma resposta antes de continuar.");
        return; // Retorna e deixa o cronômetro continuar rodando
    }

    // Se chegou aqui, ele respondeu ou o tempo acabou. Pode parar o relógio atual.
    clearInterval(timerInterval);

    // Se ele respondeu a tempo, checa se acertou
    if (!tempoEsgotado && respostaSelecionada) {
        const respostaIndex = parseInt(respostaSelecionada.value);
        const respostaCerta = perguntasAtuais[perguntaAtualIndex][2];
        
        if (respostaIndex === respostaCerta) {
            acertos++;
        }
    }

    // Vai para a próxima ou finaliza
    if (perguntaAtualIndex < perguntasAtuais.length - 1) {
        perguntaAtualIndex++;
        renderizarPergunta();
    } else {
        finalizarAvaliacao();
    }
}

function finalizarAvaliacao() {
    const urlGoogleScript = "https://script.google.com/macros/s/AKfycbyyFH0KUWpbUAZY8aqg7qPIbuwENTDCms7WVMyXBpFBFcg0QmrijUZ5CDEyVCtwp5M/exec"; 

    document.getElementById('area-avaliacao').style.display = 'none';
    
    let percentual = Math.round((acertos / perguntasAtuais.length) * 100);
    let perfil = "";

    if (percentual >= 80) {
        perfil = "APTO - Nível Alto";
    } else if (percentual >= 60) {
        perfil = "EM DESENVOLVIMENTO - Nível Médio";
    } else {
        perfil = "INAPTO - Abaixo do esperado";
    }

    let resultadoDiv = document.getElementById("resultado");
    resultadoDiv.style.display = "block";
    resultadoDiv.innerHTML = `
        <h2>Avaliação Concluída!</h2>
        <p>Você acertou <strong>${acertos}</strong> de <strong>${perguntasAtuais.length}</strong> questões.</p>
        
        <div style="background: #f1f8ff; border-left: 4px solid #1e3c72; padding: 15px; margin-top: 20px; text-align: left;">
            <p style="margin: 0; color: #333; font-size: 16px;">
                <strong>Agradecemos sua participação!</strong><br><br>
                Nossa equipe de recrutamento analisará suas respostas. Entraremos em contato em breve para os próximos passos.
            </p>
        </div>
        
        <p id="status-envio" style="margin-top:20px; font-size:14px; color:#f39c12; font-weight:bold;">
            ⏳ Enviando seus resultados para nossa base de dados...
        </p>
    `;

    let dadosCandidato = {
        nome: nomeCandidato,
        vaga: nomesVagas[idVaga],
        acertos: acertos + "/" + perguntasAtuais.length,
        compatibilidade: percentual,
        perfil: perfil
    };

    fetch(urlGoogleScript, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dadosCandidato)
    }).then(() => {
        document.getElementById("status-envio").style.color = "#25D366";
        document.getElementById("status-envio").innerText = "✅ Resultados enviados com sucesso! Você já pode fechar esta página.";
    }).catch(() => {
        document.getElementById("status-envio").style.color = "red";
        document.getElementById("status-envio").innerText = "❌ Houve um erro de conexão. Tire um print desta tela e envie para o recrutador.";
    });
}
</script>
